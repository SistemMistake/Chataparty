<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHATAPARTY</title>

<!-- 🔥 PREVIEW PŘI SDÍLENÍ -->
<meta property="og:title" content="CHATAPARTY">
<meta property="og:description" content="vstup pouze pro vyvolené">
<meta property="og:image" content="https://raw.githubusercontent.com/SistemMistake/Chataparty/main/cover.png">
<meta property="og:url" content="https://sistemmistake.github.io/Chataparty">
<meta name="theme-color" content="#000000">

<style>
body {
    background: black;
    color: red;
    font-family: monospace;
    text-align: center;
    margin: 0;
    padding: 10px;
    overflow-x: hidden;
}
.container {
    max-width: 600px;
    margin: auto;
}
h1 {
    font-size: clamp(28px, 6vw, 50px);
    animation: flicker 0.1s infinite;
}
p {
    font-size: clamp(14px, 3.5vw, 18px);
}
.glitch {
    color: lime;
    animation: glitch 0.2s infinite;
}
button {
    width: 100%;
    max-width: 300px;
    padding: 12px;
    margin: 5px;
    background: black;
    color: lime;
    border: 1px solid lime;
}
input, select {
    width: 90%;
    max-width: 300px;
    padding: 10px;
    margin: 5px;
    background: black;
    color: white;
    border: 1px solid red;
}
hr { margin: 30px 0; }
.hidden { display:none; }

@keyframes flicker {
    0%{opacity:1;}50%{opacity:0.2;}100%{opacity:1;}
}
@keyframes glitch {
    0%{transform:translate(0);}
    50%{transform:translate(2px,-2px);}
    100%{transform:translate(0);}
}
</style>
</head>

<body>
<div class="container">

<audio id="audio" loop>
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8c8f1f6e3.mp3">
</audio>

<marquee>ŽÁDNÁ PRAVIDLA • ŽÁDNÝ SYSTÉM • JEN SOUND</marquee>

<h1>⚠ SIGNAL DETEKOVÁN ⚠</h1>
<p class="glitch">neměl bys tu být</p>

<p id="partyDateText"></p>
<button onclick="reveal()">VSTOUPIT</button>

<div id="secret" class="hidden">
<a href="https://maps.google.com/?q=50.4813643,14.3957695" target="_blank">
(50.4813643, 14.3957695)
</a>
</div>

<hr>

<h2>🐸 ROSNIČKA BARČA //</h2>
<p id="weatherText">načítám...</p>

<hr>

<h2>📡 FORMULÁŘ //</h2>

<form action="https://formspree.io/f/TVUJ_KOD" method="POST">

<input type="text" name="real_name" placeholder="pravé jméno" required>
<input type="text" name="nickname" placeholder="přezdívka" required>

<select name="arrival">
<option>jedu autem</option>
<option>vyzvednout Štětí</option>
<option>vyzvednout Hněvice</option>
</select>

<select name="sleep">
<option>přespím</option>
<option>jedu domů</option>
</select>

<select name="departure">
<option>odjíždím sám</option>
<option>odvoz Štětí</option>
<option>odvoz Hněvice</option>
</select>

<input type="text" name="note" placeholder="poznámka">

<button type="submit">ODESLAT</button>

</form>

<hr>

<p>
<a href="tel:+420725410785" style="color:lime;">
+420 725 410 785
</a>
</p>

<p>volej 20 minut před příjezdem</p>
<p>→ infolinka aktivní</p>

</div>

<script>
const partyDate="12/04/2026";

function parseDate(d){
 const [day,month,year]=d.split("/");
 return `${year}-${month}-${day}`;
}

partyDateText.innerText="datum: "+partyDate;

function reveal(){
 secret.style.display="block";
 audio.play();
}

async function getWeather(){
 const apiDate=parseDate(partyDate);

 const res=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=50.48&longitude=14.39&daily=temperature_2m_max&timezone=auto`);
 const data=await res.json();

 const i=data.daily.time.indexOf(apiDate);

 if(i===-1){
 weatherText.innerText="Barča: nevidím tak daleko";
 return;
 }

 weatherText.innerText="Barča: bude cca "+data.daily.temperature_2m_max[i]+"°C 😈";
}

getWeather();
</script>

</body>
</html>
